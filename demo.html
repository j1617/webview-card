<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebView Card Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    
    h1 {
      color: #333;
      margin-bottom: 20px;
      font-size: 24px;
      text-align: center;
    }
    
    .demo-item {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 15px;
    }
    
    .demo-item h3 {
      color: #667eea;
      margin-bottom: 10px;
      font-size: 16px;
    }
    
    .counter {
      font-size: 48px;
      text-align: center;
      color: #764ba2;
      font-weight: bold;
      margin: 20px 0;
    }
    
    .btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      width: 100%;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }
    
    .btn:active {
      transform: translateY(0);
    }
    
    .clock {
      font-size: 36px;
      text-align: center;
      color: #333;
      margin: 20px 0;
      font-family: monospace;
    }
    
    .color-box {
      width: 100%;
      height: 100px;
      border-radius: 8px;
      background: linear-gradient(45deg, #667eea, #764ba2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 18px;
      cursor: pointer;
      transition: background 0.3s;
    }
    
    .message {
      margin-top: 20px;
      padding: 15px;
      background: #e8f5e9;
      color: #2e7d32;
      border-radius: 8px;
      text-align: center;
      opacity: 0;
      transition: opacity 0.3s;
    }
    
    .message.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎉 WebView Card 测试页</h1>
    
    <div class="demo-item">
      <h3>计数器（JavaScript 交互）</h3>
      <div class="counter" id="counter">0</div>
      <button class="btn" onclick="increment()">点击 +1</button>
    </div>
    
    <div class="demo-item">
      <h3>实时时钟</h3>
      <div class="clock" id="clock">--:--:--</div>
    </div>
    
    <div class="demo-item">
      <h3>点击变色</h3>
      <div class="color-box" id="colorBox" onclick="changeColor()">
        点击这里 🎨
      </div>
    </div>
    
    <div class="message" id="message">
      ✅ JavaScript 执行正常！
    </div>
  </div>

  <script>
    // 显示消息
    document.getElementById('message').classList.add('show');
    
    // 计数器
    let count = 0;
    function increment() {
      count++;
      document.getElementById('counter').textContent = count;
    }
    
    // 时钟
    function updateClock() {
      const now = new Date();
      const time = now.toLocaleTimeString('zh-CN');
      document.getElementById('clock').textContent = time;
    }
    updateClock();
    setInterval(updateClock, 1000);
    
    // 变色
    const colors = [
      'linear-gradient(45deg, #667eea, #764ba2)',
      'linear-gradient(45deg, #f093fb, #f5576c)',
      'linear-gradient(45deg, #4facfe, #00f2fe)',
      'linear-gradient(45deg, #43e97b, #38f9d7)',
      'linear-gradient(45deg, #fa709a, #fee140)',
      'linear-gradient(45deg, #a8edea, #fed6e3)',
    ];
    let colorIndex = 0;
    function changeColor() {
      colorIndex = (colorIndex + 1) % colors.length;
      document.getElementById('colorBox').style.background = colors[colorIndex];
    }
    
    // 向父窗口发送消息（如果被 iframe 嵌入）
    if (window.self !== window.top) {
      console.log('I am inside an iframe');
      window.parent.postMessage({ type: 'webview-ready', loaded: true }, '*');
    }
  </script>
</body>
</html>

# WebView Card v1.0 配置示例
# 在 Home Assistant Lovelace 中使用

# ============================================
# 示例 1: 加载远程网页
# ============================================
- type: custom:webview-card
  title: 外部网页
  url: https://example.com
  height: 500px

# ============================================
# 示例 2: 加载本地 HTML 文件
# ============================================
- type: custom:webview-card
  title: 本地页面
  local_file: my-pages/dashboard.html
  height: 600px
  allow_js: true

# ============================================
# 示例 3: 加载本地 HTML（完整路径写法）
# ============================================
- type: custom:webview-card
  title: 本地看板
  local_file: /local/my-pages/kanban.html
  height: 700px

# ============================================
# 示例 4: 使用实体状态作为 URL
# ============================================
- type: custom:webview-card
  title: 动态网页
  entity: sensor.web_url
  url: "{{sensor.web_url}}"
  height: 400px

# ============================================
# 示例 5: 禁止 JavaScript 执行
# ============================================
- type: custom:webview-card
  title: 静态页面
  url: https://example.com
  height: 400px
  allow_js: false

# ============================================
# 示例 6: 允许弹窗
# ============================================
- type: custom:webview-card
  title: 在线白板
  url: https://excalidraw.com
  height: 700px
  allow_popups: true

# ============================================
# 示例 7: 嵌入监控系统
# ============================================
- type: custom:webview-card
  title: 摄像头监控
  local_file: camera/monitor.html
  height: 480px

# ============================================
# 示例 8: 全屏展示模式
# ============================================
- type: custom:webview-card
  title: 数据大屏
  local_file: dashboards/fullscreen.html
  height: 100vh

# ============================================
# 示例 9: 嵌入在线图表工具
# ============================================
- type: custom:webview-card
  title: Chart.js 演示
  url: https://www.chartjs.org/docs/latest/samples/information.html
  height: 600px

# ============================================
# 示例 10: 使用 hass 状态变量
# ============================================
- type: custom:webview-card
  title: 动态内容
  url: "https://api.example.com/data?id={{sensor.sensor_id}}"
  height: 400px
